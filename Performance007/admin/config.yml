# =============================================================
# Decap CMS – konfigurácia administrátorského rozhrania
# pre performance007.sk
# =============================================================

backend:
  name: github
  repo: qq8nnfs962-sudo/Performance007   # <-- ZMEŇ ak by si premenoval/presunul repo
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

# Kde sa nahrávajú obrázky cez UI (drag&drop)
media_folder: ""        # priečinok v repe (root)
public_folder: "/"      # cesta v URL na webe

# Slovenské texty UI
locale: 'cs'            # najbližšie k SK, plne podporované

# =============================================================
# KOLEKCIE (čo sa dá editovať)
# =============================================================
collections:
  # ---------- VOZIDLÁ ----------
  - name: "vehicles"
    label: "Vozidlá"
    label_singular: "Vozidlo"
    description: "Spravuj zoznam vozidiel zobrazených na webe."
    files:
      - file: "vehicles.json"
        name: "vehicles_list"
        label: "Zoznam vozidiel"
        fields:
          - name: vehicles
            label: "Vozidlá"
            label_singular: "Vozidlo"
            widget: list
            summary: "{{fields.year}} {{fields.make}} {{fields.model}} – {{fields.price}} €"
            fields:
              - {name: id,            label: "ID (bez medzier, napr. p007-bmw-m4)", widget: string}
              - {name: year,          label: "Rok výroby",         widget: number, value_type: int, min: 1990, max: 2030}
              - {name: make,          label: "Značka",             widget: string}
              - {name: model,         label: "Model",              widget: string}
              - {name: price,         label: "Cena (EUR)",         widget: number, value_type: int, min: 0}
              - {name: hp,            label: "Výkon (HP)",         widget: number, value_type: int, min: 0}
              - {name: drivetrain,    label: "Pohon",              widget: select, options: ["RWD","AWD","4MATIC","xDrive","FWD"]}
              - {name: zeroToHundred, label: "0–100 km/h (sekundy)", widget: number, value_type: float, min: 0, step: 0.1}
              - {name: mileage,       label: "Nájazd (km)",        widget: number, value_type: int, min: 0}
              - {name: image,         label: "Fotka vozidla",      widget: image, choose_url: false, hint: "Odporúčaná veľkosť: aspoň 1200×800 px, formát .webp / .jpg / .png"}
              - {name: tags,          label: "Štítky (krátke vlastnosti)", widget: list, default: [], hint: "Napr. Sport Chrono, PCCB, Karbónový balík"}
              - {name: dossier,       label: "Popis vozidla",      widget: text, hint: "1–3 vety, zobrazí sa v technickej zložke"}

  # ---------- OBRÁZKY POZADIA SEKCIÍ ----------
  - name: "media"
    label: "Médiá – pozadia sekcií"
    files:
      - file: "media-info.md"
        name: "media_info"
        label: "Tipy na výmenu pozadi"
        fields:
          - {name: body, label: "Návod", widget: markdown, default: "Pre výmenu pozadia jednotlivých sekcií webu nahraj cez tlačidlo **Media** vľavo dole nový obrázok pod presne týmto názvom (a prepíš starý):\n\n- **hero.webp** – hlavný banner hore\n- **objednavka.webp** – sekcia ‚Vozidlá na objednávku‘\n- **dossier.webp** – sekcia ‚Technická zložka‘\n- **garaz.webp** – sekcia ‚Garáž‘\n- **finance.webp** – sekcia ‚Financovanie‘\n\nOdporúčaná veľkosť: 1920×1080 px (Full HD), formát .webp alebo .jpg."}
